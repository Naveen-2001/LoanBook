services:
  - type: web
    name: loanbook
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: AUTH_PIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
